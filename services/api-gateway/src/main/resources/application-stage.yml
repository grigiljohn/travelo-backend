# Profile: stage — set SPRING_CONFIG_IMPORT, EUREKA_*, and gateway *SERVICE_URI in ECS/SSM
spring:
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
management:
  metrics:
    tags:
      service: api-gateway
      environment: stage
