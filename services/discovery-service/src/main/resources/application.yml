server:
  port: ${PORT:${DISCOVERY_SERVICE_PORT:8088}}

spring:
  application:
    name: discovery-service
  profiles:
    default: dev
  config:
    import: optional:configserver:http://localhost:8888
  # Search / reindex APIs need Elasticsearch at startup: repository beans connect during context refresh.
  # From repo root: docker compose up -d elasticsearch   (see docker-compose.yml service "elasticsearch")
  # Or one-off: docker run --rm -p 9200:9200 -e discovery.type=single-node -e xpack.security.enabled=false docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: discovery-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

app:
  # Google Places (legacy REST) — set GOOGLE_PLACES_API_KEY for live search / tagging / map pins.
  google:
    places:
      api-key: ${GOOGLE_PLACES_API_KEY:AIzaSyA8zvzKo6AcNgJJO-aMTVOa0c6OjKyvwFA}

  post-service:
    url: ${POST_SERVICE_URL:http://localhost:8096}
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  shop-service:
    url: ${SHOP_SERVICE_URL:http://localhost:8097}
  auth-db:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/travelo_auth}
    username: ${AUTH_DB_USERNAME:travelo}
    password: ${AUTH_DB_PASSWORD:travelo}

  # Curated collections surfaced on the Explore tab. These are editor-
  # maintained "saved searches" — a set of keywords that drive the
  # detail-view search query. Edit freely; no DB migration required.
  curated-collections:
    items:
      - id: weekend-getaways
        title: Best weekend getaways
        subtitle: Short escapes under 48 hours
        coverImageUrl: https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200
        tag: Editor's pick
        keywords: [weekend, getaway, beach, short-trip]
      - id: solo-travel
        title: Solo travel stories
        subtitle: One-person itineraries that actually work
        coverImageUrl: https://images.unsplash.com/photo-1527631746610-bca00a040d60?w=1200
        tag: Community
        keywords: [solo, backpack, itinerary, slow-travel]
      - id: mountain-escapes
        title: Mountain escapes
        subtitle: Alpine views, cabins, and crisp air
        coverImageUrl: https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200
        tag: Seasonal
        keywords: [mountain, alps, hiking, cabin, winter]
      - id: food-trails
        title: Food trails
        subtitle: Eating your way through a city
        coverImageUrl: https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200
        keywords: [food, restaurant, street-food, cafe, dining]
      - id: hidden-gems
        title: Hidden gems
        subtitle: Places most travelers miss
        coverImageUrl: https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1200
        tag: Off-the-grid
        keywords: [hidden, underrated, off-the-beaten-path, local]

  # OpenAI — POST /api/v1/ai/trip/build-itinerary (OPENAI_API_KEY; template fallback when empty / disabled)
  openai:
    enabled: ${OPENAI_ENABLED:true}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    connect-timeout-ms: 15000
    read-timeout-ms: 120000

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      post-service:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      shop-service:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      elasticsearch:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
  retry:
    instances:
      user-service:
        maxAttempts: 2
        waitDuration: 200ms
      post-service:
        maxAttempts: 2
        waitDuration: 200ms
      shop-service:
        maxAttempts: 2
        waitDuration: 200ms
      elasticsearch:
        maxAttempts: 2
        waitDuration: 300ms

logging:
  pattern:
    console: "%d{ISO8601} %-5level [%X{trace_id:-}] [%X{span_id:-}] [%thread] %logger - %msg%n"
  level:
    root: INFO
    com.travelo.searchservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
