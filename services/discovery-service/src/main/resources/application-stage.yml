# Profile: stage — set ELASTICSEARCH, KAFKA, EUREKA, and GOOGLE_PLACES from SSM/Secrets
spring:
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
management:
  metrics:
    tags:
      service: discovery-service
      environment: stage
app:
  rate-limit:
    enabled: true
    default-rate: 300
    per-user-rate: 500
