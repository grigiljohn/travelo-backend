# Loaded early; avoids YAML colon issues and IDE "default profile" overrides skipping native.
server.port=8888
spring.application.name=config-server
# Composite with only native backend — no Git URI required (Spring Cloud Config 4.x).
# composite = native config backend; add dev|stage|production for metrics/ops (override via SPRING_PROFILES_ACTIVE).
spring.profiles.active=composite,dev
spring.cloud.config.server.composite[0].type=native
spring.cloud.config.server.composite[0].search-locations=classpath:/configs/
spring.cloud.config.label=main
