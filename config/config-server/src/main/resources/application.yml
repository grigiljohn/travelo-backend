# Prefer settings in application.properties (composite native; no Git).
# This file keeps shared logging / management; optional PORT override for server.port.
server:
  port: ${PORT:8888}

spring:
  application:
    name: config-server
  cloud:
    config:
      label: main

logging:
  pattern:
    console: "%d{ISO8601} %-5level [%X{trace_id:-}] [%X{span_id:-}] [%thread] %logger - %msg%n"
  level:
    root: INFO
    org.springframework: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
