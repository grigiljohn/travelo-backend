name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Dmaven.test.failure.ignore=true'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run tests
        run: mvn clean test
      
      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/*.xml'
          reporter: 'java-junit'
          fail-on-error: false

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - social-service
          - media-service
          - commerce-service
          - api-gateway
          - realtime-service
          - platform-service
          - identity-service
          - discovery-service
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build application
        run: mvn clean package -pl services/${{ matrix.service }} -am -DskipTests
      
      - name: Build Docker image
        run: |
          docker build -t travelo/${{ matrix.service }}:${{ github.sha }} -f services/${{ matrix.service }}/Dockerfile .
          docker tag travelo/${{ matrix.service }}:${{ github.sha }} travelo/${{ matrix.service }}:latest
      
      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push travelo/${{ matrix.service }}:${{ github.sha }}
          docker push travelo/${{ matrix.service }}:latest

  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: Deploy to Staging
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to staging environment"
          # Add kubectl deployment commands here

  deploy-production:
    name: Deploy to Production
    needs: [test, build, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Kubernetes (Canary)
        run: |
          echo "Deploying canary to production"
          # Add canary deployment commands here
      
      - name: Wait for canary verification
        run: sleep 300
      
      - name: Promote canary to full deployment
        run: |
          echo "Promoting canary deployment"
          # Add promotion commands here

