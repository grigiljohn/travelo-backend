server:
  port: ${PORT:8761}

spring:
  application:
    name: service-registry
  profiles:
    default: dev
  # Quoted: multiple ":" in value breaks YAML unless quoted. Use localhost for IDE; override in Docker/K8s.
  config:
    import: "${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}"

logging:
  pattern:
    console: "%d{ISO8601} %-5level [%X{trace_id:-}] [%X{span_id:-}] [%thread] %logger - %msg%n"
  level:
    root: INFO
    org.springframework: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
