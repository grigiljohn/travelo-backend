# Force Docker image build (avoids Railpack/Nixpacks running `java -jar target/*jar` from repo root).
# To deploy a different service, change `dockerfilePath` to e.g. `services/social-service/Dockerfile`.
[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api-gateway/Dockerfile"

[deploy]
# Do not set startCommand here or in the Railway UI — use the image ENTRYPOINT (java -jar /app/app.jar).
healthcheckPath = "/actuator/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
