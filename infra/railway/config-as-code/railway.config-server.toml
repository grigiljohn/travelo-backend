# Per-service Railway config: add this path under Settings → Config-as-code for the
# config-server service only (avoids repo-root railway.json building api-gateway).

[build]
builder = "DOCKERFILE"
dockerfilePath = "config/config-server/Dockerfile"
watchPatterns = ["config/config-server/**", "libs/**", "pom.xml"]

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
