service:
  name: realtime-service
  port: 8098

# Realtime-service holds WebSocket connections; keep sessions sticky-ish by
# not being too aggressive with HPA. ALB ingress uses stickiness annotations.
extraEnv:
  - name: EUREKA_CLIENT_ENABLED
    value: "false"
  - name: SPRING_CONFIG_IMPORT
    value: ""
  - name: APP_MESSAGING_INTERNAL_API_BASE
    value: "http://127.0.0.1:8098/api/v1"
  - name: KAFKA_WS_BRIDGE_ENABLED
    value: "true"
  - name: USER_SERVICE_URL
    value: "http://travelo-identity-service:8081"

envFrom:
  - secretRef:
      name: travelo-realtime-service-secrets
  # Expected keys: MESSAGING_JDBC_URL, NOTIFICATION_JDBC_URL, *_POSTGRES_USER/PASSWORD,
  # KAFKA_BOOTSTRAP_SERVERS, JWT_SECRET

resources:
  limits:   { cpu: 2000m, memory: 1.5Gi }
  requests: { cpu: 500m,  memory: 768Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
