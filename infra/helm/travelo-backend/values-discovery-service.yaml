service:
  name: discovery-service
  port: 8088

extraEnv:
  - name: EUREKA_CLIENT_ENABLED
    value: "false"
  - name: SPRING_CONFIG_IMPORT
    value: ""
  - name: USER_SERVICE_URL
    value: "http://travelo-identity-service:8081"
  - name: POST_SERVICE_URL
    value: "http://travelo-social-service:8096"
  - name: SHOP_SERVICE_URL
    value: "http://travelo-commerce-service:8097"

envFrom:
  - secretRef:
      name: travelo-discovery-service-secrets
  # Expected keys: ELASTICSEARCH_URIS (Amazon OpenSearch https endpoint),
  # ELASTICSEARCH_USERNAME, ELASTICSEARCH_PASSWORD,
  # KAFKA_BOOTSTRAP_SERVERS, AUTH_DB_URL/USERNAME/PASSWORD,
  # GOOGLE_PLACES_API_KEY (optional; enables Google Places in discovery-service)

resources:
  limits:   { cpu: 1000m, memory: 1Gi }
  requests: { cpu: 250m,  memory: 512Mi }
