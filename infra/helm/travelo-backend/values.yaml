# =============================================================================
# Travelo Helm chart — shared defaults.
# Every service is deployed with its own `helm install` passing a
# per-service values file (see values-<service>.yaml next to this file).
# =============================================================================

# `service.name` MUST be overridden in the per-service file (e.g. "media-service").
service:
  name: ""                  # required: short name, used in resource names & selectors
  type: ClusterIP
  port: 8080                # container + service port

replicaCount: 1

image:
  repository: ""            # e.g. 123456789012.dkr.ecr.ap-southeast-2.amazonaws.com/travelo
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Spring profile inside the container. `production` is the default on EKS.
environment: production

# ---------------- probes ----------------
# Paths already exposed by Spring Boot actuator.
probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /actuator/health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

# ---------------- resources ----------------
resources:
  limits:   { cpu: 1000m, memory: 1Gi }
  requests: { cpu: 200m,  memory: 512Mi }

# ---------------- autoscaling ----------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# ---------------- security ----------------
# Images already run as uid 1001. These defaults harden the pod further;
# individual services can override if they need filesystem writes.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ---------------- service account (IRSA) ----------------
serviceAccount:
  create: true
  name: ""
  # Set via per-service values — EKS IRSA role arn for S3, Rekognition etc.
  # Example:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/travelo-media-s3
  annotations: {}

# ---------------- env plumbing ----------------
# Free-form env list — appended after the chart's built-ins.
extraEnv: []
# Pull everything in a ConfigMap or Secret as env vars.
envFrom: []
# Plain, non-sensitive service config emitted as a ConfigMap.
configMap:
  enabled: false
  data: {}
# Secret managed by the chart. For production use AWS Secrets Manager /
# External Secrets Operator and leave `secret.enabled=false` + reference
# the pre-created secret via `envFrom`.
secret:
  enabled: false
  stringData: {}

# ---------------- networking ----------------
# `ingress` uses the AWS Load Balancer Controller annotations.
# Only enabled for api-gateway in the default per-service values.
ingress:
  enabled: false
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/liveness
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
  hosts: []
  tls: []

# ---------------- pod placement ----------------
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Extra volumes + mounts (e.g. tmpfs for media FFmpeg scratch).
volumes: []
volumeMounts: []

# ServiceMonitor for kube-prometheus-stack operators.
serviceMonitor:
  enabled: false
  interval: 30s
  path: /actuator/prometheus
