# Optional on EKS — Kubernetes Services + DNS already provide discovery, so
# most deployments turn off Eureka (EUREKA_CLIENT_ENABLED=false in the other
# per-service values). Install this chart only if you want to keep Eureka for
# legacy callers during the migration.

service:
  name: service-registry
  port: 8761

extraEnv: []

probes:
  liveness:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /actuator/health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

resources:
  limits:   { cpu: 500m, memory: 512Mi }
  requests: { cpu: 100m, memory: 256Mi }

autoscaling:
  enabled: false
