service:
  name: config-server
  port: 8888

# Config-server in native mode serves classpath bundled configs — no DB/Redis.
environment: native

extraEnv: []

probes:
  liveness:
    path: /actuator/health
    initialDelaySeconds: 40
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

resources:
  limits:   { cpu: 500m, memory: 512Mi }
  requests: { cpu: 100m, memory: 256Mi }

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
