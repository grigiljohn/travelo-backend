apiVersion: v1
kind: Service
metadata:
  name: {{ include "travelo-backend.fullname" . }}-{{ .Values.service.name }}
  labels:
    {{- include "travelo-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.service.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "travelo-backend.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.service.name }}

