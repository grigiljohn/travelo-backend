{{- if .Values.configMap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "travelo-backend.fullname" . }}-{{ .Values.service.name }}-config
  labels:
    {{- include "travelo-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.service.name }}
data:
  {{- toYaml .Values.configMap.data | nindent 2 }}
{{- end }}
